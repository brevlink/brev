name: Deploy Landing

on:
  push:
    branches: [main]
    paths:
      - 'landing/**'
      - 'Dockerfile.landing'
      - '.github/workflows/deploy-landing.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: brevlink/brev-landing

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.landing
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Trigger Portainer redeploy
        if: github.ref == 'refs/heads/main'
        env:
          PORTAINER_API_TOKEN: ${{ secrets.PORTAINER_API_TOKEN }}
          PORTAINER_URL: ${{ secrets.PORTAINER_URL }}
          PORTAINER_ENDPOINT_ID: ${{ secrets.PORTAINER_ENDPOINT_ID }}
          PORTAINER_STACK_ID_LANDING: ${{ secrets.PORTAINER_STACK_ID_LANDING }}
        run: |
          if [ -z "$PORTAINER_API_TOKEN" ] && [ -z "$PORTAINER_URL" ] && [ -z "$PORTAINER_ENDPOINT_ID" ] && [ -z "$PORTAINER_STACK_ID_LANDING" ]; then
            echo "Portainer redeploy skipped (not configured)"
            exit 0
          fi
          if [ -z "$PORTAINER_API_TOKEN" ] || [ -z "$PORTAINER_URL" ] || [ -z "$PORTAINER_ENDPOINT_ID" ] || [ -z "$PORTAINER_STACK_ID_LANDING" ]; then
            echo "Portainer redeploy failed: incomplete configuration"
            exit 1
          fi
          curl --fail-with-body --show-error --silent --location --request POST \
            -H "Authorization: Bearer ${PORTAINER_API_TOKEN}" \
            -H "Content-Type: application/json" \
            "${PORTAINER_URL}/api/stacks/${PORTAINER_STACK_ID_LANDING}/git/redeploy?endpointId=${PORTAINER_ENDPOINT_ID}"
