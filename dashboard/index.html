<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Brev Dashboard — Manage your short links" />
    <title>Brev Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" href="/favicon-32.png" />
    <style>
      :root { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; }
      body { background: #0a0d2e; color: #fff; -webkit-font-smoothing: antialiased; }
      .font-mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
      .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.06); }
      .glow { box-shadow: 0 0 40px -8px rgba(59,130,246,0.15); }
      .gradient-text { background: linear-gradient(135deg, #c0c3f0, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
      .sidebar-glass { background: rgba(10,13,46,0.9); border-right: 1px solid rgba(255,255,255,0.06); }
      .input-dark { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.1); color: #fff; }
      .input-dark:focus { border-color: #3b82f6; outline: none; box-shadow: 0 0 0 3px rgba(59,130,246,0.15); }
      .input-dark::placeholder { color: rgba(255,255,255,0.3); }
      .btn-primary { background: #3b82f6; }
      .btn-primary:hover { background: #2563eb; }
      .scrollbar-thin { scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
